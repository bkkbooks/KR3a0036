body:
  text: 提要儒言一卷儒家類臣等謹案儒言一卷宋晁説之撰説之字以道鉅野人少慕司馬光之為人光晚號迂叟説之因自號曰景迂元豐五年進士蘇軾以著述科薦之元符中以上書入邪等靖康初召為著作郎試中書舍人兼太子詹事建炎初擢徽猷閣待制髙宗惡其作書非孟子勒令致仕是書已編入景迂生集然晁公武讀書志已别著録盖當時亦集外别行也公武以是書為辨王安石學術違僻而作今觀所論大抵新經義後字説居多而托始于安石之廢春秋公武所言良信然序稱作扵元黓執徐實徽宗政和二年壬辰在崇寧二年安石配享孔子後故其中孔孟一條名聖一條祀聖一條皆直斥其事則實與紹述之徒辨非但與安石辨也又不奪一條心迹一條及流品以下凡數條併兼斥安石之居心行事亦非但為學術辨也當紹述之説盛行而侃侃不撓誠不愧儒者之言至于因安石附㑹周禮而詆周禮因安石尊崇孟子而抑孟子則有激之談務與相反惟以恩怨為是非殊不足為訓盖元祐諸人實有負氣求勝攻訐太甚以釀黨錮之禍者賢智之過亦不必曲為諱也取其大㫖之正可矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:16e0986318d3ee02b21593065fc70646720ebba511780df0caff6ce14dbe7c33
